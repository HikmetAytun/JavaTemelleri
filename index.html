<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayramın Mübarek Olsun ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #1a0f1c;
    --bg-mid: #2d1b2e;
    --bg-soft: #3d2640;
    --rose: #d4a5b8;
    --rose-glow: #e8b9cc;
    --gold: #d4af6f;
    --gold-soft: #e8c98a;
    --cream: #f5e6d3;
    --ink: #f8ecdc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 20%, var(--bg-soft) 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    position: relative;
    overflow-x: hidden;
    padding: 40px 20px;
  }

  /* Yıldız arka plan */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: var(--cream);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.9; transform: scale(1); }
  }

  /* Kalpler */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    bottom: -50px;
    color: var(--rose-glow);
    font-size: 18px;
    opacity: 0;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 8px rgba(232, 185, 204, 0.6));
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* Ana kart */
  .container {
    position: relative;
    z-index: 2;
    max-width: 620px;
    margin: 0 auto;
    padding: 60px 40px;
    background: linear-gradient(160deg, rgba(61, 38, 64, 0.6) 0%, rgba(45, 27, 46, 0.4) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 175, 111, 0.25);
    border-radius: 2px;
    box-shadow: 
      0 30px 80px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    text-align: center;
    animation: fadeInUp 1.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Süslemeler */
  .ornament-top, .ornament-bottom {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--gold);
    margin: 0 auto;
    width: 80%;
    opacity: 0;
    animation: fadeIn 1.5s 0.5s forwards;
  }
  .ornament-top { margin-bottom: 30px; }
  .ornament-bottom { margin-top: 30px; }
  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .ornament-symbol {
    font-size: 14px;
    letter-spacing: 4px;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Hilal & yıldız */
  .crescent {
    display: inline-block;
    font-size: 48px;
    color: var(--gold-soft);
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px rgba(232, 201, 138, 0.5));
    animation: gentleFloat 4s ease-in-out infinite;
    opacity: 0;
    animation: fadeIn 1s 0.3s forwards, gentleFloat 4s ease-in-out 1.3s infinite;
  }
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Tipografi */
  .greeting {
    font-family: 'Marcellus', serif;
    font-size: clamp(28px, 6vw, 42px);
    color: var(--gold-soft);
    letter-spacing: 2px;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeInUp 1.2s 0.6s forwards;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(48px, 10vw, 72px);
    color: var(--rose-glow);
    margin-bottom: 40px;
    line-height: 1.1;
    text-shadow: 0 0 30px rgba(232, 185, 204, 0.4);
    opacity: 0;
    animation: fadeInUp 1.2s 0.9s forwards;
  }

  .message {
    font-size: clamp(17px, 3.5vw, 20px);
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream);
    margin: 30px 0;
    font-style: italic;
    opacity: 0;
    animation: fadeInUp 1.2s 1.2s forwards;
  }

  .message strong {
    font-weight: 500;
    color: var(--rose-glow);
    font-style: normal;
  }

  .signature {
    margin-top: 40px;
    font-family: 'Marcellus', serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeInUp 1.2s 1.5s forwards;
  }

  .signature-name {
    display: block;
    margin-top: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--rose-glow);
    text-transform: none;
    letter-spacing: 1px;
  }

  /* Köşe süslemeleri */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 1px solid var(--gold);
    opacity: 0.6;
  }
  .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
  .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
  .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

  @media (max-width: 600px) {
    .container { padding: 50px 25px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="hearts" id="hearts"></div>

<div class="container">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="crescent">🐑</div>

  <div class="ornament-top">
    <div class="ornament-line"></div>
    <div class="ornament-symbol">✦ ❀ ✦</div>
    <div class="ornament-line"></div>
  </div>

  <div class="greeting">Bayramın Mübarek Olsun</div>
  <div class="name">Aşkım Karım</div>

  <div class="message">
    Hayatımın en güzel bayramı, seninle geçirdiğim her bayram.<br>
    Bu mübarek günde dualarım, kalbim ve tüm sevgim seninle.<br>
    İyi ki varsın, iyi ki <strong>benimsin</strong>.
  </div>

  <div class="ornament-bottom">
    <div class="ornament-line"></div>
    <div class="ornament-symbol">♡</div>
    <div class="ornament-line"></div>
  </div>

  <div class="signature">
    Seni Seven Kocan
    <span class="signature-name">Hikmet</span>
  </div>
</div>

<script>
  // Yıldızları oluştur
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
    star.style.animationDelay = Math.random() * 3 + 's';
    starsContainer.appendChild(star);
  }

  // Yüzen kalpleri oluştur
  const heartsContainer = document.getElementById('hearts');
  const heartSymbols = ['♥', '♡', '❤'];
  
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (Math.random() * 16 + 12) + 'px';
    heart.style.animationDuration = (Math.random() * 8 + 8) + 's';
    heart.style.animationDelay = Math.random() * 2 + 's';
    heartsContainer.appendChild(heart);
    
    setTimeout(() => heart.remove(), 16000);
  }

  // İlk kalpleri ekle
  for (let i = 0; i < 8; i++) {
    setTimeout(createHeart, i * 800);
  }
  
  // Sürekli kalp ekle
  setInterval(createHeart, 1500);
</script>

</body>
</html>
